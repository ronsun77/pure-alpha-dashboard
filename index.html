<!DOCTYPE html>
<html lang="zh-Hant">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Pure Alpha Dashboard</title>

<style>

body{
  background:#0f172a;
  color:white;
  font-family:Arial,sans-serif;
  padding:30px;
}

h1{
  margin-bottom:20px;
}

.card{
  background:#1e293b;
  padding:25px;
  border-radius:16px;
  max-width:700px;
}

.metric{
  margin-bottom:18px;
  font-size:18px;
}

.green{
  color:#22c55e;
  font-weight:bold;
}

.red{
  color:#ef4444;
  font-weight:bold;
}

.yellow{
  color:#facc15;
  font-weight:bold;
}

.small{
  font-size:12px;
  color:#94a3b8;
  margin-top:20px;
  word-break:break-all;
}

</style>

</head>

<body>

<h1>Pure Alpha Dashboard</h1>

<div class="card">

<div class="metric">
QQQ Price:
<span id="qqq-price">
Loading...
</span>
</div>

<div class="metric">
MA200:
<span id="qqq-ma200">
Loading...
</span>
</div>

<div class="metric">
Market Status:
<span id="market-status">
Loading...
</span>
</div>

<div class="metric">
Suggested QLD Weight:
<span id="qld-weight">
Loading...
</span>
</div>

<div class="metric">
Suggested SGOV Weight:
<span id="sgov-weight">
Loading...
</span>
</div>

<div class="metric">
Last Update:
<span id="update-time">
Loading...
</span>
</div>

<div class="small">
API Debug:
<div id="debug-box">
Waiting...
</div>
</div>

</div>

<script>

const API_KEY = 'b286e5ff15bc4cf8a2eb07d873e3ed3a';

async function loadData(){

try{

const url =
`https://api.twelvedata.com/time_series?symbol=QQQ&interval=1day&outputsize=250&apikey=${API_KEY}`;

const response =
await fetch(url);

const data =
await response.json();

document.getElementById('debug-box')
.innerText =
'API Connected Successfully';

if(!data.values){

throw new Error('No values data');

}

const closes =
data.values
.map(v => parseFloat(v.close))
.filter(v => !isNaN(v));

if(closes.length < 200){

throw new Error('Not enough MA200 data');

}

const current =
closes[0];

const ma200Array =
closes.slice(0,200);

const ma200 =
ma200Array.reduce((a,b)=>a+b,0)
/
ma200Array.length;

document.getElementById('qqq-price')
.innerText =
current.toFixed(2);

document.getElementById('qqq-ma200')
.innerText =
ma200.toFixed(2);

const bull =
current > ma200;

document.getElementById('market-status')
.innerText =
bull ?
'Bull Market'
:
'Bear Market';

document.getElementById('market-status')
.className =
bull ?
'green'
:
'red';

const qld =
bull ? 20 : 5;

const sgov =
bull ? 15 : 35;

document.getElementById('qld-weight')
.innerText =
qld + '%';

document.getElementById('sgov-weight')
.innerText =
sgov + '%';

document.getElementById('update-time')
.innerText =
new Date().toLocaleString();

}

catch(error){

console.log(error);

document.getElementById('market-status')
.innerText =
'ERROR';

document.getElementById('market-status')
.className =
'red';

document.getElementById('debug-box')
.innerText =
error;

}

}

loadData();

setInterval(loadData,1800000);

</script>

</body>

</html>
