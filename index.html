<!DOCTYPE html>
<html lang="zh-Hant">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pure Alpha Dashboard</title>

<style>

body{
  background:#0f172a;
  color:white;
  font-family:Arial;
  padding:30px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  max-width:500px;
}

.green{
  color:#22c55e;
}

.red{
  color:#ef4444;
}

</style>

</head>

<body>

<h1>Pure Alpha Dashboard</h1>

<div class="card">

<h2>QQQ Market Status</h2>

<p>
QQQ Price:
<span id="qqq-price">
Loading...
</span>
</p>

<p>
MA200:
<span id="qqq-ma200">
Loading...
</span>
</p>

<p>
Status:
<span id="qqq-status">
Loading...
</span>
</p>

</div>

<script>

async function run(){

try{

const url =
'https://query1.finance.yahoo.com/v8/finance/chart/QQQ?interval=1d&range=1y';

const response =
await fetch(url);

const data =
await response.json();

const result =
data.chart.result[0];

const closes =
result.indicators.quote[0]
.close.filter(v=>v!==null);

const current =
closes[closes.length-1];

const ma200 =
closes.slice(-200)
.reduce((a,b)=>a+b,0)/200;

document.getElementById('qqq-price')
.innerText =
current.toFixed(2);

document.getElementById('qqq-ma200')
.innerText =
ma200.toFixed(2);

const bull =
current > ma200;

document.getElementById('qqq-status')
.innerText =
bull ?
'Bull Market'
:
'Bear Market';

document.getElementById('qqq-status')
.className =
bull ?
'green'
:
'red';

}

catch(error){

console.log(error);

document.getElementById('qqq-status')
.innerText =
'API Error';

}

}

run();

</script>

</body>

</html>
