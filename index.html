<script>

async function fetchMarketData() {

  try {

    // ===== Symbols =====

    const symbols = ['QQQ', '^VIX'];

    // ===== Fetch Data =====

    const results = await Promise.all(

      symbols.map(async (symbol) => {

        const yahooUrl =
          `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=1y`;

        const proxyUrl =
          `https://api.allorigins.win/raw?url=${encodeURIComponent(yahooUrl)}`;

        const response = await fetch(proxyUrl);

        if (!response.ok) {
          throw new Error('Fetch Failed');
        }

        const data = await response.json();

        // ===== 檢查資料 =====

        if (
          !data.chart ||
          !data.chart.result ||
          !data.chart.result[0]
        ) {
          throw new Error('Yahoo Data Error');
        }

        const result = data.chart.result[0];

        const closes =
          result.indicators.quote[0].close
            .filter(v => v !== null);

        // ===== 計算 =====

        const current =
          closes[closes.length - 1];

        const ma200 =
          closes
            .slice(-200)
            .reduce((a,b)=>a+b,0) / 200;

        return {
          symbol,
          current,
          ma200
        };

      })

    );

    // ===== 找資料 =====

    const qqq =
      results.find(r => r.symbol === 'QQQ');

    const vix =
      results.find(r => r.symbol === '^VIX');

    // ===== 更新 QQQ =====

    document.getElementById('qqq-price').innerText =
      qqq.current.toFixed(2);

    document.getElementById('qqq-ma200').innerText =
      qqq.ma200.toFixed(2);

    // ===== 牛熊判定 =====

    const bull =
      qqq.current > qqq.ma200;

    document.getElementById('qqq-status').innerText =
      bull ? 'Above MA200' : 'Below MA200';

    document.getElementById('qqq-status').className =
      bull ? 'value green' : 'value red';

    document.getElementById('market-regime').innerText =
      bull ? 'Bull Market' : 'Bear Market';

    document.getElementById('market-regime').className =
      bull ? 'signal bull' : 'signal bear';

    // ===== 更新 VIX =====

    document.getElementById('vix-value').innerText =
      vix.current.toFixed(2);

    // ===== 動態配置 =====

    let qldWeight = 20;
    let sgovWeight = 15;

    // Bear Market

    if (!bull) {

      qldWeight = 5;
      sgovWeight = 35;

    }

    // High Volatility

    if (vix.current > 30) {

      qldWeight = 0;
      sgovWeight = 45;

    }

    document.getElementById('qld-weight').innerText =
      qldWeight + '%';

    document.getElementById('sgov-weight').innerText =
      sgovWeight + '%';

    // ===== 更新時間 =====

    document.getElementById('update-time').innerText =
      new Date().toLocaleString();

  }

  catch(error) {

    console.error(error);

    // ===== Error 顯示 =====

    document.getElementById('qqq-status').innerText =
      'API Error';

    document.getElementById('market-regime').innerText =
      'API Error';

    document.getElementById('vix-value').innerText =
      'API Error';

  }

}

// ===== 初始執行 =====

fetchMarketData();

// ===== 每30分鐘更新 =====

setInterval(fetchMarketData, 1800000);

</script>
