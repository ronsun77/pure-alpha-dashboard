<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure Alpha 動態對沖策略控制台</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #121212; color: #e0e0e0; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background-color: #1e1e1e; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        h1 { color: #fff; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .status-panel { display: flex; justify-content: space-between; background-color: #2c2c2c; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .input-group { display: flex; flex-direction: column; }
        label { margin-bottom: 5px; color: #aaa; font-size: 0.9em; }
        input { background-color: #121212; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 4px; font-size: 16px; width: 120px; }
        .mode-indicator { font-size: 1.5em; font-weight: bold; padding: 10px 20px; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
        .mode-bull { background-color: #1b5e20; color: #a5d6a7; }
        .mode-bear { background-color: #b71c1c; color: #ef9a9a; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
        th { color: #888; }
        .btn { background-color: #0d47a1; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 15px; }
        .btn:hover { background-color: #1565c0; }
    </style>
</head>
<body>

<div class="container">
    <h1>Pure Alpha 戰情儀表板</h1>
    
    <div class="status-panel">
        <div class="input-group">
            <label for="qqqPrice">QQQ 目前價格</label>
            <input type="number" id="qqqPrice" value="709.41" step="0.01">
        </div>
        <div class="input-group">
            <label for="ma200Price">MA200 數值</label>
            <input type="number" id="ma200Price" value="610.78" step="0.01">
        </div>
        <div id="marketMode" class="mode-indicator mode-bull">
            牛市進攻模式
        </div>
    </div>
    
    <button class="btn" onclick="calculateStrategy()">更新策略狀態</button>

    <h2>當前目標配置權重</h2>
    <table>
        <thead>
            <tr>
                <th>資產 (代碼)</th>
                <th>角色定義</th>
                <th>目標權重</th>
            </tr>
        </thead>
        <tbody id="allocationTable">
            </tbody>
    </table>
</div>

<script>
    // 預設牛市進攻部位 (參考你的 CSV 設定)
    const bullAllocation = [
        { asset: 'QQQ (00662)', role: '核心成長', target: '28.5%' },
        { asset: 'QLD (00670L)', role: '動能放大 (MA200濾網)', target: '35.1%' },
        { asset: 'TLT (00679B)', role: '避險防禦', target: '7.3%' },
        { asset: 'GLD (00635U)', role: '避險防禦', target: '7.3%' },
        { asset: 'SGOV (00859B)', role: '流動性緩衝', target: '13.5%' },
        { asset: 'UUP', role: '美元避險', target: '8.3%' }
    ];

    // 預設熊市防禦部位 (QLD 清零，轉入現金/避險)
    const bearAllocation = [
        { asset: 'QQQ (00662)', role: '核心成長', target: '20.0%' },
        { asset: 'QLD (00670L)', role: '動能放大 (MA200濾網)', target: '0.0%' },
        { asset: 'TLT (00679B)', role: '避險防禦', target: '15.0%' },
        { asset: 'GLD (00635U)', role: '避險防禦', target: '15.0%' },
        { asset: 'SGOV (00859B)', role: '流動性緩衝 (冬眠儲備)', target: '40.0%' },
        { asset: 'UUP', role: '美元避險', target: '10.0%' }
    ];

    function renderTable(data) {
        const tbody = document.getElementById('allocationTable');
        tbody.innerHTML = '';
        data.forEach(row => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td><strong>${row.asset}</strong></td><td>${row.role}</td><td>${row.target}</td>`;
            tbody.appendChild(tr);
        });
    }

    function calculateStrategy() {
        const qqq = parseFloat(document.getElementById('qqqPrice').value);
        const ma200 = parseFloat(document.getElementById('ma200Price').value);
        const modeIndicator = document.getElementById('marketMode');
        
        // 判定邏輯：QQQ 價格是否大於 MA200
        if (qqq > ma200) {
            modeIndicator.className = 'mode-indicator mode-bull';
            modeIndicator.innerText = `牛市進攻 (比值: ${(qqq/ma200).toFixed(2)})`;
            renderTable(bullAllocation);
        } else {
            modeIndicator.className = 'mode-indicator mode-bear';
            modeIndicator.innerText = `熊市防禦 (比值: ${(qqq/ma200).toFixed(2)})`;
            renderTable(bearAllocation);
        }
    }

    // 初始化畫面
    calculateStrategy();
</script>

</body>
</html>
