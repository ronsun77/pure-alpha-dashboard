<body>

<h1>Pure Alpha Dashboard</h1>

<div class="card">

<div class="metric">
QQQ Price:
<span id="qqq-price">
Loading...
</span>
</div>

<div class="metric">
MA200:
<span id="qqq-ma200">
Loading...
</span>
</div>

<div class="metric">
Market Status:
<span id="market-status">
Loading...
</span>
</div>

<div class="metric">
Suggested QLD Weight:
<span id="qld-weight">
Loading...
</span>
</div>

<div class="metric">
Suggested SGOV Weight:
<span id="sgov-weight">
Loading...
</span>
</div>

<div class="metric">
Last Update:
<span id="update-time">
Loading...
</span>
</div>

</div>

<script>

const API_KEY = 'HCILAYEW4Y64TM3P';

async function loadData(){

try{

const url =
`https://www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol=QQQ&outputsize=full&apikey=${API_KEY}`;

const response =
await fetch(url);

const data =
await response.json();

const ts =
data["Time Series (Daily)"];

if(!ts){

console.log(data);

throw new Error('API Data Error');

}
  
const dates =
Object.keys(ts);

const closes =
dates.map(
d => parseFloat(ts[d]["4. close"])
);

const current =
closes[0];

const ma200 =
closes.slice(0,200)
.reduce((a,b)=>a+b,0)/200;

document.getElementById('qqq-price')
.innerText =
current.toFixed(2);

document.getElementById('qqq-ma200')
.innerText =
ma200.toFixed(2);

const bull =
current > ma200;

document.getElementById('market-status')
.innerText =
bull ?
'Bull Market'
:
'Bear Market';

document.getElementById('market-status')
.className =
bull ?
'green'
:
'red';

let qld =
bull ? 20 : 5;

let sgov =
bull ? 15 : 35;

document.getElementById('qld-weight')
.innerText =
qld + '%';

document.getElementById('sgov-weight')
.innerText =
sgov + '%';

document.getElementById('update-time')
.innerText =
new Date().toLocaleString();

}

catch(error){

console.log(error);

document.getElementById('market-status')
.innerText =
'API Error';

document.getElementById('market-status')
.className =
'red';

}

}

loadData();

setInterval(loadData,1800000);

</script>

</body>

</html>
