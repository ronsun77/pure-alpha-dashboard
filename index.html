<script>

async function fetchMarketData() {

  try {

    const symbols = ['QQQ', '^VIX'];

    const results = await Promise.all(

      symbols.map(async (symbol) => {

        const targetUrl = encodeURIComponent(
          `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=1y`
        );

        const url =
          `https://api.allorigins.win/raw?url=${targetUrl}`;

        const response = await fetch(url);

        const data = await response.json();

        const result = data.chart.result[0];

        const closes =
          result.indicators.quote[0].close.filter(v => v !== null);

        const current = closes[closes.length - 1];

        const ma200 =
          closes.slice(-200).reduce((a,b)=>a+b,0)/200;

        return {
          symbol,
          current,
          ma200
        };

      })

    );

    const qqq =
      results.find(r => r.symbol === 'QQQ');

    const vix =
      results.find(r => r.symbol === '^VIX');

    // ===== 更新 QQQ =====

    document.getElementById('qqq-price').innerText =
      qqq.current.toFixed(2);

    document.getElementById('qqq-ma200').innerText =
      qqq.ma200.toFixed(2);

    const bull = qqq.current > qqq.ma200;

    document.getElementById('qqq-status').innerText =
      bull ? 'Above MA200' : 'Below MA200';

    document.getElementById('qqq-status').className =
      bull ? 'value green' : 'value red';

    document.getElementById('market-regime').innerText =
      bull ? 'Bull Market' : 'Bear Market';

    document.getElementById('market-regime').className =
      bull ? 'signal bull' : 'signal bear';

    // ===== 更新 VIX =====

    document.getElementById('vix-value').innerText =
      vix.current.toFixed(2);

    // ===== 動態配置 =====

    let qldWeight = 20;
    let sgovWeight = 15;

    if (!bull) {

      qldWeight = 5;
      sgovWeight = 35;

    }

    if (vix.current > 30) {

      qldWeight = 0;
      sgovWeight = 45;

    }

    document.getElementById('qld-weight').innerText =
      qldWeight + '%';

    document.getElementById('sgov-weight').innerText =
      sgovWeight + '%';

    // ===== 更新時間 =====

    document.getElementById('update-time').innerText =
      new Date().toLocaleString();

  }

  catch(error) {

    console.log(error);

    document.getElementById('qqq-status').innerText =
      'API Error';

    document.getElementById('market-regime').innerText =
      'API Error';

    document.getElementById('vix-value').innerText =
      'API Error';

  }

}

fetchMarketData();

setInterval(fetchMarketData, 1800000);

</script>
